name: Deploy MoneyFactory to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code with submodules (themes)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # Step 2: Fix TOML encoding errors (smart quotes, BOM, non-ASCII)
      - name: Fix TOML encoding issues
        run: |
          echo "=== Checking hugo.toml for encoding issues ==="
          # Remove BOM (Byte Order Mark)
          sed -i 's/ï»¿//g' hugo.toml 2>/dev/null || true
          # Replace smart/curly quotes with plain ASCII quotes
          sed -i "s/'/'/g; s/'/'/g" hugo.toml 2>/dev/null || true
          sed -i 's/"/"/g; s/"/"/g' hugo.toml 2>/dev/null || true
          # Remove non-ASCII characters that break TOML
          sed -i 's/[^[:print:]	]//g' hugo.toml 2>/dev/null || true
          # Show line 15 for debugging
          echo "=== Line 15 of hugo.toml ==="
          sed -n '15p' hugo.toml | cat -A
          echo "=== TOML file looks clean ==="

      # Step 3: Setup Hugo Extended
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # Step 4: Install Node.js dependencies (for PostCSS, Tailwind, etc.)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            echo "No package-lock.json found, skipping npm ci"
          fi

      # Step 5: Configure Git (fixes unicode filename issues)
      - name: Configure Git
        run: git config --global core.quotepath false

      # Step 6: Setup Pages
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Step 7: Build Hugo site with cache
      - name: Build Hugo site
        run: |
          hugo             --gc             --minify             --baseURL "${{ steps.pages.outputs.base_url }}/"             --environment production
        env:
          HUGO_ENVIRONMENT: production

      # Step 8: Verify build output
      - name: Verify build
        run: |
          echo "=== Build output ==="
          ls -la public/
          echo "=== Index file ==="
          head -20 public/index.html || echo "No index.html found!"

      # Step 9: Upload artifact for deployment
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: "${{ steps.deployment.outputs.page_url }}"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
